name: Terraform CI Checks

on:
  push:
  pull_request:
    branches:
      - main

jobs:
    parse-modules:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Get Terraform Modules folders
              id: get-modules
              run: |
                MODULES=$(ls -d modules/*/ | sed 's|modules/||g' | sed 's|/||g' | jq -R -s -c 'split("\n")[:-1]')
                echo "modules=$MODULES" >> $GITHUB_OUTPUT

            - name: Output Modules
              run: |
                echo "Modules: ${{ steps.get-modules.outputs.modules }}"

    module-checks:
        runs-on: ubuntu-latest
        needs: parse-modules
        strategy:
            matrix:
                module: ${{ fromJson(needs.parse-modules.outputs.modules) }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: "1.14.6"

            - name: Terraform Format Check
              run: terraform fmt -check -recursive

            - name: Terraform Init
              run: terraform init -backend=false

            - name: Terraform Validate
              run: terraform validate -no-color

    
    parse-apps:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Get Terraform apps folders
              id: get-apps
              run: |
                MODULES=$(ls -d apps/*/ | sed 's|apps/||g' | sed 's|/||g' | jq -R -s -c 'split("\n")[:-1]')
                echo "modules=$MODULES" >> $GITHUB_OUTPUT

            - name: Output Modules
              run: |
                echo "Modules: ${{ steps.get-apps.outputs.modules }}"

    app-checks:
        runs-on: ubuntu-latest
        needs: parse-apps
        strategy:
            matrix:
                module: ${{ needs.parse-apps.outputs.modules }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: "1.14.6"

            - name: Terraform Format Check
              run: terraform fmt -check -recursive
              
            - name: Terraform Init
              run: terraform init -backend=false

            - name: Terraform Validate
              run: terraform validate -no-color

